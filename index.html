<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oguzhan Ocakoglu | Frontend Developer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <main class="page-wrapper">
      <section class="profile-card">
        <img src="images/oguzhan.webp" alt="Oguzhan Ocakoglu profil fotoğrafı" />
        <h1>Oguzhan OCAKOGLU</h1>
        <p class="job-title">Frontend Developer</p>
        <p class="description">Yeni bir yazılımcı adayı.</p>
        <div class="social-links" aria-label="Sosyal bağlantılar">
          <a href="https://github.com/denatril" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <svg class="social-icon" width="16" height="16" aria-hidden="true">
              <use href="./images/icons.svg#icon-github"></use>
            </svg>
          </a>
          <a href="https://www.linkedin.com/in/oguzhanocakoglu/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <svg class="social-icon" width="16" height="16" aria-hidden="true">
              <use href="./images/icons.svg#icon-linkedin"></use>
            </svg>
          </a>
          <a href="mailto:ornek@mail.com" aria-label="E-posta">
            <svg class="social-icon" width="16" height="16" aria-hidden="true">
              <use href="./images/icons.svg#icon-mail"></use>
            </svg>
          </a>
        </div>
      </section>

      <section class="contact-form">
        <h2>Bize Ulaşın</h2>
        <form>
          <label for="name">Adınız:</label>
          <input type="text" id="name" name="name" required placeholder="Adınız"/>

          <label for="email">E-posta:</label>
          <input type="email" id="email" name="email" required placeholder="E-posta"/>

          <label for="message">Mesajınız:</label>
          <textarea id="message" name="message" rows="4" required placeholder="Mesajınız"></textarea>

          <button type="submit">Gönder</button>
        </form>
      </section>
    </main>
  </body>
</html>
